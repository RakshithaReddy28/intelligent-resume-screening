<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Match Finder{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-bullseye me-2"></i>Job Match Finder
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" id="nav-dashboard" style="display:none;">
                        <a class="nav-link" href="/dashboard"><i class="fas fa-home me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item" id="nav-jobs" style="display:none;">
                        <a class="nav-link" href="/jobs"><i class="fas fa-briefcase me-1"></i>Jobs</a>
                    </li>
                    <li class="nav-item" id="nav-resumes" style="display:none;">
                        <a class="nav-link" href="/resumes"><i class="fas fa-file-alt me-1"></i>My Resume</a>
                    </li>
                    <li class="nav-item" id="nav-logout" style="display:none;">
                        <a class="nav-link" href="#" onclick="doLogout()"><i class="fas fa-sign-out-alt me-1"></i>Logout</a>
                    </li>
                    <li class="nav-item" id="nav-login">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item" id="nav-register">
                        <a class="nav-link" href="/register">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function getToken() {
            return localStorage.getItem('access_token');
        }

        function getUser() {
            try {
                return JSON.parse(localStorage.getItem('user'));
            } catch (e) {
                return null;
            }
        }

        function getHeaders() {
            var t = getToken();
            return {
                'Content-Type': 'application/json',
                'Authorization': t ? 'Bearer ' + t : ''
            };
        }

        function doLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        function updateNav() {
            var token = getToken();
            var user = getUser();

            if (token && user) {
                document.getElementById('nav-dashboard').style.display = 'block';
                document.getElementById('nav-jobs').style.display = 'block';
                document.getElementById('nav-resumes').style.display = 'block';
                document.getElementById('nav-logout').style.display = 'block';
                document.getElementById('nav-login').style.display = 'none';
                document.getElementById('nav-register').style.display = 'none';
            }
        }

        function formatPercent(val) {
            return Math.round(val * 100) + '%';
        }

        function scoreColor(score) {
            if (score >= 0.75) return 'success';
            if (score >= 0.55) return 'primary';
            if (score >= 0.40) return 'warning';
            return 'danger';
        }

        function scoreLabel(score) {
            if (score >= 0.75) return 'Excellent Match';
            if (score >= 0.55) return 'Good Match';
            if (score >= 0.40) return 'Moderate Match';
            return 'Low Match';
        }

        updateNav();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
